{% extends "base.html" %}

{% block title %}Menu - FoodHub{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/menu.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Search Bar -->
    <div class="row mb-4">
        <div class="col-md-11 mx-auto">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="form-control search-input" 
                    id="searchInput" 
                    placeholder="Search for food items..."
                >
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-11 mx-auto">
            <div class="filter-panel">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label mb-1">Category</label>
                        <select id="categoryFilter" class="form-select">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Veg Type</label>
                        <select id="vegFilter" class="form-select">
                            <option value="">All</option>
                            <option value="veg">Veg</option>
                            <option value="non-veg">Non-Veg</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Popularity</label>
                        <select id="popularityFilter" class="form-select">
                            <option value="">All</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Min Price</label>
                        <input id="minPriceFilter" type="number" class="form-control" min="0" placeholder="e.g. 200">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Max Price</label>
                        <input id="maxPriceFilter" type="number" class="form-control" min="0" placeholder="e.g. 600">
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button id="resetFiltersBtn" class="btn btn-outline-secondary w-100" type="button">Reset</button>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label mb-1">Sort By</label>
                        <select id="sortByFilter" class="form-select">
                            <option value="newest">Newest</option>
                            <option value="rating">Rating</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                            <option value="time">Delivery Time</option>
                            <option value="popularity">Popularity</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Items Grid -->
    <div class="row g-4 px-3">
        <div id="menuItemsContainer" class="row g-4">
            <!-- Items will be loaded here -->
        </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="text-center py-5" style="display: none;">
        <i class="fas fa-search" style="font-size: 48px; color: #ccc;"></i>
        <h3 class="mt-3 text-muted">No items found</h3>
        <p class="text-muted">Try adjusting your search criteria</p>
    </div>
</div>

<script src="{{ url_for('static', filename='js/menu.js') }}"></script>
{% endblock %}
