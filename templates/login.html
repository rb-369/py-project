<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodHub</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/IconOnlyLogo.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
</head>
<body class="bg-gradient">
    <div class="auth-container">
        <div class="auth-box">
            <div class="text-center mb-4">
                <h1 class="brand-title">
                    <img src="{{ url_for('static', filename='images/IconOnlyLogo.png') }}" alt="FoodHub" class="auth-logo"> FoodHub
                </h1>
                <p class="text-muted">Delicious food delivered to your door</p>
            </div>

            <ul class="nav nav-tabs gap-2 mb-4" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-form" type="button" role="tab">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-form" type="button" role="tab">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="login-form" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="login-username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="login-username" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="login-password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <div id="loginAlert"></div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                </div>

                <!-- Register Form -->
                <div class="tab-pane fade" id="register-form" role="tabpanel">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="register-username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="register-username" placeholder="Choose a username" required>
                            </div>
                            <small class="text-muted">At least 3 characters</small>
                        </div>

                        <div class="mb-3">
                            <label for="register-password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="register-password" placeholder="Create a password" required>
                            </div>
                            <small class="text-muted">At least 6 characters</small>
                        </div>

                        <div class="mb-3">
                            <label for="register-confirm-password" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="register-confirm-password" placeholder="Confirm your password" required>
                            </div>
                        </div>

                        <div id="registerAlert"></div>

                        <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="fas fa-lock"></i> Your data is secure and encrypted
            </small>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
