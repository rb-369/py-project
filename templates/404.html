{% extends "base.html" %}

{% block title %}Page Not Found - FoodHub{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="error-container">
        <h1 class="display-1 fw-bold text-danger">404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="text-muted mb-4">Sorry, the page you're looking for doesn't exist or has been moved.</p>
        
        <div>
            <a href="/menu" class="btn btn-primary btn-lg me-2">
                <i class="fas fa-home"></i> Go to Menu
            </a>
            <a href="/orders" class="btn btn-outline-primary btn-lg">
                <i class="fas fa-history"></i> View Orders
            </a>
        </div>
    </div>
</div>
{% endblock %}
