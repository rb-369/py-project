{% extends "base.html" %}

{% block title %}Register - FoodHub{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="auth-container full-height">
    <div class="auth-box">
        <div class="text-center mb-4">
            <h1 class="brand-title">
                <img src="{{ url_for('static', filename='images/foodhub-logo.png') }}" alt="FoodHub" class="auth-logo"> FoodHub
            </h1>
            <p class="text-muted">Create your account to start ordering</p>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="register-username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="register-username" placeholder="Choose a username" required>
                </div>
                <small class="text-muted">At least 3 characters</small>
            </div>

            <div class="mb-3">
                <label for="register-password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="register-password" placeholder="Create a password" required>
                </div>
                <small class="text-muted">At least 6 characters</small>
            </div>

            <div class="mb-3">
                <label for="register-confirm-password" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="register-confirm-password" placeholder="Confirm your password" required>
                </div>
            </div>

            <div id="registerAlert"></div>

            <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">
                <i class="fas fa-user-plus"></i> Create Account
            </button>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Already have an account? <a href="/login">Login here</a>
                </small>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
